<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f11;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      -webkit-app-region: drag;
      user-select: none;
    }
    .icon { font-size: 40px; }
    h1 { font-size: 20px; font-weight: 600; }
    p { font-size: 13px; color: #71717a; text-align: center; max-width: 320px; line-height: 1.6; }
    a {
      font-size: 13px;
      color: #7c3aed;
      text-decoration: none;
      -webkit-app-region: no-drag;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="icon">⚠️</div>
  <h1>Impossible de démarrer</h1>
  <p>Docker n'a pas pu démarrer. Vérifiez que Docker Desktop est installé et lancé, puis relancez Gael.</p>
  <a href="https://www.docker.com/products/docker-desktop/">Télécharger Docker Desktop</a>
</body>
</html>
